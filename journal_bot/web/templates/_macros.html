{# Reusable macros #}

{% macro title_link(a) %}
<a href="/article/{{ a.id }}" class="art-title"
   hx-get="/api/tooltip/{{ a.id }}" hx-trigger="mouseenter once" hx-target="find .tooltip"
   hx-swap="innerHTML">{{ a.title }}<span class="tooltip"></span></a>
{% endmacro %}

{# Inline export-actions next to a title: Zotero + Obsidian #}
{% macro title_actions(a) %}
<span class="title-actions" style="font-size:.8rem; font-weight:normal; white-space:nowrap; margin-left:.5rem;">
  {% if a.zotero_key %}
  <span style="color:var(--lesenswert);" title="In Zotero gespeichert">✓ Zotero</span>
  {% else %}
  <span id="zotero-{{ a.id }}" style="display:inline;">
    <a href="#" style="color:var(--muted); text-decoration:none;"
       hx-post="/api/zotero/{{ a.id }}" hx-target="#zotero-{{ a.id }}" hx-swap="innerHTML"
       title="In Zotero exportieren"
       onclick="event.preventDefault();">→ Zotero</a>
  </span>
  {% endif %}
  <span style="color:var(--muted); margin:0 .15rem;">·</span>
  <span id="obsidian-{{ a.id }}" style="display:inline;">
    <a href="#" style="color:var(--muted); text-decoration:none;"
       hx-post="/api/obsidian/{{ a.id }}" hx-target="#obsidian-{{ a.id }}" hx-swap="innerHTML"
       title="Als Markdown in den Obsidian-Vault exportieren"
       onclick="event.preventDefault();">→ Obsidian</a>
  </span>
</span>
{% endmacro %}
